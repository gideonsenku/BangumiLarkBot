services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

  bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    depends_on:
      - redis
    env_file:
      - ../.env
    environment:
      REDIS_HOST: redis
    volumes:
      - ../data:/app/data
    ports:
      - "6008:6008"

volumes:
  redis-data:
